openapi: "3.0.0"
info:
  title: BG Library
  version: "1.0"
servers:
  - url: ${API_URL}
    description: Dynamic Server
paths:
  /health:
    get:
      tags:
        - health
      responses:
        '204':
          description: Service healthy
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/game:
    post:
      tags:
        - games
      operationId: addGame
      summary: Add a game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/games:
    get:
      tags:
        - games
      operationId: listGames
      summary: Get list of all games with check out status
      parameters:
        - in: query
          name: checkedOut
          schema:
            type: boolean
          description: Filter games by check out status (optional)
        - in: query
          name: title
          schema:
            type: string
          description: Filter games by title (optional)
      responses:
        '200':
          description: List of games with checkout status successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStatusList'
    post:
      tags:
        - games
      operationId: bulkAddGames
      summary: Add multiple games
      description: |
        Add multiple games by uploading a CSV file. 
        This call is all or nothing. If any game fails to be added, none will be added.
        The CSV file should contain a list of games, one per line, in the following format: 
        "Catan"\n"Ticket to Ride"\n"Azul"
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              format: byte
              description: Base64 encoded CSV of games to add
      responses:
        '201':
          description: Games added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAddResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/game/id/{gameId}:
    get:
      tags:
        - games
      operationId: getGame
      summary: Get a game
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      responses:
        '200':
          description: Game found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - games
      operationId: updateGame
      summary: Update an existing game
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '204':
          description: Game successfully updated
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - games
      operationId: deleteGame
      summary: Soft delete a game
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      responses:
        '204':
          description: Game deleted successfully
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/game/barcode/{gameBarcode}:
    get:
      tags:
        - games
        - barcode
      operationId: getGameByBarcode
      summary: Get game(s) from a barcode
      description: |
        Get game(s) that match the provided barcode. 
        If multiple games have the same barcode, all will be returned.
        This covers the case where a library uses UPCs in lieu of unique barcodes.
        Unlike the search endpoints, this endpoint will return a 404 if no games are found.
      parameters:
        - in: path
          name: gameBarcode
          schema:
            type: string
          required: true
          description: Game Barcode
      responses:
        '200':
          description: Game(s) found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameList'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/patron:
    post:
      tags:
        - patrons
      operationId: addPatron
      summary: Add a patron
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatronRequest'
      responses:
        '201':
          description: Patron added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patron'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/patrons:
    get:
      tags:
        - patrons
      operationId: listPatrons
      summary: Get list of all patrons
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter patrons by name (optional)
      responses:
        '200':
          description: List of games with checkout status successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatronList'
    post:
      tags:
        - patrons
      operationId: bulkAddPatrons
      summary: Add multiple patrons
      description: |
        Add multiple patrons by uploading a CSV file.
        This call is all or nothing. If any patron fails to be added, none will be added.
        The CSV file should contain a list of patrons names, one per line, in the following format: 
        "John Smith"\n"Jane Doe"\n"Alice Baker"
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              format: byte
              description: Base64 encoded CSV of patrons to add
      responses:
        '201':
          description: Patrons added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAddResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/patron/id/{patronId}:
    get:
      tags:
        - patrons
      operationId: getPatron
      summary: Get a patron
      parameters:
        - in: path
          name: patronId
          schema:
            type: string
            format: uuid
          required: true
          description: Patron ID
      responses:
        '200':
          description: Patron found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patron'
        '404':
          description: Patron not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - patrons
      operationId: updatePatron
      summary: Update an existing patron
      parameters:
        - in: path
          name: patronId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatronRequest'
      responses:
        '204':
          description: Patron successfully updated
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patron not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - patrons
      operationId: deletePatron
      summary: Soft delete a patron
      parameters:
        - in: path
          name: patronId
          schema:
            type: string
            format: uuid
          required: true
          description: Patron ID
      responses:
        '204':
          description: Patron deleted successfully
        '404':
          description: Patron not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/patron/barcode/{patronBarcode}:
    get:
      tags:
        - patrons
        - barcode
      operationId: getPatronByBarcode
      summary: Get a patron from a barcode
      parameters:
        - in: path
          name: patronBarcode
          schema:
            type: string
          required: true
          description: Patron Barcode
      responses:
        '200':
          description: Patron found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patron'
        '404':
          description: Patron not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/checkin:
    post:
      tags:
        - transactions
      operationId: checkInGame
      summary: Check in a game
      description: |
        Make an idempotent call to check in a game.
        If the game is already checked in, the most recent library transaction will be returned will be returned
      parameters:
        - in: query
          name: transactionId
          schema:
            type: string
            format: uuid
          required: true
          description: Transaction ID
      responses:
        '204':
          description: Check in successful
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/checkout:
    post:
      tags:
        - transactions
      operationId: checkOutGame
      summary: Check out a game
      description: |
        Make an idempotent call to check out a game.
        If the game is already checked out, the existing checkout will be returned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckOutRequest'
      responses:
        '201':
          description: Check out successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryTransaction'
        '400':
          description: Game/Patron not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Game already checked out to a different patron
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/library/transactions:
    get:
      tags:
        - transactions
      operationId: listTransactionEvents
      summary: List transaction events
      description: |
        List all library transactions, ordered by timestamp (newest first).
        Game titles and patron names filters stack, so if you filter by both title and patron name, 
        only games with that title and patron name will be returned
      parameters:
        - in: query
          name: game_title
          schema:
            type: string
          description: Filter by game title (optional)
        - in: query
          name: patron_name
          schema:
            type: string
          description: Filter by patron name (optional)
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 100
          description: Limit the number of transactions returned (optional)
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Offset for pagination (optional)
      responses:
        '200':
          description: List of library transactions successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionEventList'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ptw/game/gameId/{gameId}:
    post:
      tags:
        - ptw
        - games
      operationId: addPlayToWinGame
      summary: Mark a library game as play to win
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      responses:
        '204':
          description: Game marked as play to win successfully
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - ptw
        - games
      operationId: removePlayToWinGame
      summary: Mark a library game as not play to win
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
            format: uuid
          required: true
          description: Game ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemovePlayToWinGameRequest'
      responses:
        '204':
          description: Game marked as not play to win successfully
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ptw/session:
    post:
      tags:
        - ptw
      operationId: addPlayToWinSession
      summary: Add a play to win session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayToWinSessionRequest'
      responses:
        '201':
          description: Play to win session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayToWinSession'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Play to win game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ptw/entries/playToWinId/{playToWinId}:
    get:
      tags:
        - ptw
      operationId: getPlayToWinSessionEntries
      parameters:
        - in: path
          name: playToWinId
          schema:
            type: string
            format: uuid
          required: true
          description: Play to win game ID
      description: Get play to win entries by game
      summary: Get all play to win entries for a play to win game
      responses:
        '200':
          description: Play to win entries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayToWinEntryList'
        '404':
          description: Play to Win game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ptw/games:
    get:
      tags:
        - ptw
      operationId: listPlayToWinGames
      summary: List play to win games
      parameters:
        - in: query
          name: title
          schema:
            type: string
          description: Filter by game title (optional)
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 100
          description: Limit the number of games returned (optional)
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Offset for pagination (optional)
      responses:
        '200':
          description: List of play to win games successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayToWinGameList'

  /api/v1/ptw/game/ptwId/{ptwId}:
    get:
      tags:
        - ptw
      operationId: getPlayToWinGame
      parameters:
        - in: path
          name: ptwId
          required: true
          schema:
            type: string
            format: uuid
          description: Play to win game ID
      responses:
        '200':
          description: Play to win game retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayToWinGame'
        '404':
          description: Play to win game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Get a play to win game by ID

components:
  schemas:
    GameStatus:
      type: object
      required:
        - game
      properties:
        game:
          $ref: "#/components/schemas/Game"
        patron:
          $ref: "#/components/schemas/Patron"
        transactionId:
          type: string
          format: uuid
          description: Transaction ID
          example: "f13bb82c-18dd-4a94-a878-44ca6706e2d9"
        checkedOutAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the game was checked out
          example: "2026-01-31T12:00:00Z"
      description: Game with check out info

    Game:
      type: object
      required:
        - gameId
        - title
        - isPlayToWin
      properties:
        gameId:
          type: string
          format: uuid
          description: Game ID
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: The name of the board game
          example: "Catan"
        barcode:
          type: string
          minLength: 1
          maxLength: 48
          description: The barcode of the game
          example: "9780307455925"
        isPlayToWin:
          type: boolean
          description: Indicates if the game is a play-to-win game
          example: true
          default: false
      description: A game in the library

    GameList:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/Game'
          description: Array of games
      description: List of games

    CreateGameRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: The name of the board game
          example: "Catan"
        barcode:
          type: string
          minLength: 1
          maxLength: 48
          description: The barcode of the game
          example: "9780307455925"
        isPlayToWin:
          type: boolean
          description: Indicates if the game is a play-to-win game
          example: true
          default: false
      description: Request payload for creating a new game

    Patron:
      type: object
      required:
        - patronId
        - name
      properties:
        patronId:
          type: string
          format: uuid
          description: Patron ID
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: The name of the patron
          example: "John Smith"
        barcode:
          type: string
          minLength: 1
          maxLength: 48
          description: The barcode of the patron
          example: "9780307455925"
      description: A library patron

    CreatePatronRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: The name of the patron
          example: "John Smith"
        barcode:
          type: string
          minLength: 1
          maxLength: 48
          description: The barcode of the patron
          example: "9780307455925"
      description: Request payload for creating a new patron

    GameStatusList:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameStatus'
          description: Array of the game statuses
      description: List of games with check out info

    PatronList:
      type: object
      required:
        - patrons
      properties:
        patrons:
          type: array
          items:
            $ref: '#/components/schemas/Patron'
          description: Array of patrons
      description: List of patrons with check out info

    CheckOutRequest:
      type: object
      required:
        - patronId
        - gameId
      properties:
        patronId:
          type: string
          format: uuid
          description: Patron ID
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        gameId:
          type: string
          format: uuid
          description: Game ID
          example: "cc4bda14-ee18-45c0-b09b-a1dcd18c0df9"
      description: Request payload for making a check in/out transaction

    LibraryTransaction:
      type: object
      required:
        - id
        - patronId
        - gameId
        - timestamp
      properties:
        id:
          type: string
          format: uuid
          description: Transaction ID
          example: "f13bb82c-18dd-4a94-a878-44ca6706e2d9"
        patronId:
          type: string
          format: uuid
          description: Patron ID
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        gameId:
          type: string
          format: uuid
          description: Game ID
          example: "cc4bda14-ee18-45c0-b09b-a1dcd18c0df9"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the transaction occurred in UTC
          example: "2026-01-31T12:00:00Z"
      description: Request payload for making a check in/out transaction

    TransactionEvent:
      type: object
      required:
        - transaction_id
        - patron
        - game
        - event_timestamp
        - event_type
      properties:
        transaction_id:
          type: string
          format: uuid
          description: Transaction ID
          example: "f13bb82c-18dd-4a94-a878-44ca6706e2d9"
        game:
          $ref: "#/components/schemas/Game"
        patron:
          $ref: "#/components/schemas/Patron"
        event_timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the transaction occurred in UTC
          example: "2026-01-31T12:00:00Z"
        event_type:
          type: string
          enum:
            - check_in
            - check_out
          description: Type of transaction event
          example: "check_out"
      description: Record of a library transaction event

    TransactionEventList:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionEvent'
          description: Array of transaction events
      description: List of transaction events

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - details
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - SERVICE_UNAVAILABLE
                - INTERNAL_ERROR
                - NOT_FOUND
                - CONFLICT
                - MALFORMED_REQUEST
              description: Machine readable error code
              example: "VALIDATION_ERROR"
            message:
              type: string
              description: Human-readable error message
              example: "Validation Error"
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
              description: Array of specific field errors. Empty if no specific errors
      description: Response when errors occur

    ErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: The input field that caused the error
          example: "title"
        message:
          type: string
          description: Human-readable error message for this field
          example: "Title cannot exceed 100 characters"
      description: Details about specific errors

    BulkAddResponse:
      type: object
      required:
        - imported
      properties:
        imported:
          type: integer
          format: int32
          description: Number of records imported successfully
          example: 10
      description: Response for bulk add operations

    RemovePlayToWinGameRequest:
      type: object
      required:
        - RemovalReason
      properties:
        RemovalReason:
          type: string
          enum:
            - claimed
            - mistake
            - other
          description: The reason for removing the game from play to win
          example: "mistake"
        RemovalComment:
          type: string
          description: Optional comment explaining the reason for removing the game from play to win
          example: "The game was a library copy, not a play to win game"
          maxLength: 500
      description: Request payload for removing a game from play to win

    CreatePlayToWinSessionRequest:
      type: object
      required:
        - playToWinId
        - entries
      properties:
        playToWinId:
          type: string
          format: uuid
          description: The play to win ID this session is tied to
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        playtimeMinutes:
          type: integer
          format: int32
          description: The estimated playtime for this session in minutes
          example: 60
          minimum: 0
        entries:
          type: array
          items:
            type: object
            required:
              - entrantName
              - entrantUniqueId
            properties:
              entrantName:
                type: string
                maxLength: 100
                minLength: 1
                example: "John Smith"
                description: The name of the entrant
              entrantUniqueId:
                type: string
                maxLength: 100
                minLength: 1
                example: "1234567890"
                description: The unique ID of the entrant
            description: An entry in the play to win session
          description: Array of entries in the play to win session
      description: Request payload for creating a play to win session

    PlayToWinEntry:
      type: object
      required:
        - entryId
        - entrantName
        - entrantUniqueId
      properties:
        entryId:
          type: string
          format: uuid
          description: The ID of the entry
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        entrantName:
          type: string
          maxLength: 100
          minLength: 1
          example: "John Smith"
          description: The name of the entrant
        entrantUniqueId:
          type: string
          maxLength: 100
          minLength: 1
          example: "1234567890"
          description: The unique ID of the entrant
      description: A single play to win entry

    PlayToWinSession:
      type: object
      required:
        - sessionId
        - playToWinEntries
      properties:
        sessionId:
          type: string
          format: uuid
          description: The ID of the session
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        playtimeMinutes:
          type: integer
          format: int32
          minLength: 0
          example: 60
          description: The estimated playtime for this session in minutes
        playToWinEntries:
          type: array
          items:
            $ref: '#/components/schemas/PlayToWinEntry'
          description: Array of entries in the play to win session
      description: A play to win game session

    PlayToWinEntryList:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/PlayToWinEntry'
          description: Array of play to win entries
      description: List of play to win entries

    PlayToWinGame:
      type: object
      required:
        - playToWinId
        - gameId
        - title
      properties:
        playToWinId:
          type: string
          format: uuid
          description: The ID of the play to win game
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        gameId:
          type: string
          format: uuid
          description: The ID of the game
          example: "e1e07b70-c9f3-442f-8225-fe468c3ae705"
        title:
          type: string
          description: The title of the game
          example: "Azul"
        winner:
          type: object
          $ref: '#/components/schemas/PlayToWinEntry'
          description: The winner of the play to win game, not set if raffle has not happened

    PlayToWinGameList:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/PlayToWinGame'
          description: Array of play to win games
      description: List of play to win games
