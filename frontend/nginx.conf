# Map to handle X-Forwarded-Proto correctly with proxy
# If X-Forwarded-Proto is already set (from Cloudflare), use it
# Otherwise, use the current connection scheme
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_HOST};

    # Root directory where SvelteKit build output is located
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing
    # If a file or directory is not found, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle backend call routing
    location /api {
        proxy_pass http://backend:${BACKEND_PORT}/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle swagger yaml routing (must come before /swagger location)
    location = /swagger/api.yaml {
        set $should_expose_swagger "${EXPOSE_SWAGGER_UI}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        proxy_pass http://backend:${BACKEND_PORT}/swagger/api.yaml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle swagger UI routing
    location /swagger/ {
        set $should_expose_swagger "${EXPOSE_SWAGGER_UI}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        proxy_pass http://backend:${BACKEND_PORT}/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Add headers for security and caching
    location ~* .(?:ico|css|js|gif|jpe?g|png)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}

# HTTPS/SSL server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${NGINX_HOST};

    # SSL certificate paths
    ssl_certificate /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Root directory where SvelteKit build output is located
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing
    # If a file or directory is not found, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle backend call routing
    location /api {
        proxy_pass http://backend:${BACKEND_PORT}/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle swagger yaml routing (must come before /swagger location)
    location = /swagger/api.yaml {
        set $should_expose_swagger "${EXPOSE_SWAGGER_UI}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        proxy_pass http://backend:${BACKEND_PORT}/swagger/api.yaml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle swagger UI routing
    location /swagger/ {
        set $should_expose_swagger "${EXPOSE_SWAGGER_UI}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        proxy_pass http://backend:${BACKEND_PORT}/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Add headers for security and caching
    location ~* .(?:ico|css|js|gif|jpe?g|png)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}

