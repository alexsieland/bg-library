server {
    listen 80;
    server_name ${NGINX_HOST};

    # Root directory where SvelteKit build output is located
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing
    # If a file or directory is not found, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle backend call routing
    location /api {
        proxy_pass http://backend:${BACKEND_PORT}/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle swagger UI routing
    location /swagger {
        set $should_expose_swagger "${EXPOSE_SWAGGER}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        
        # Try to serve index.html if no file requested
        if ($uri = /swagger) {
            return 301 /swagger/;
        }
        
        alias /usr/share/nginx/html/swagger/;
        index index.html;
    }

    # API Spec
    location = /api.yaml {
        set $should_expose_swagger "${EXPOSE_SWAGGER}";
        if ($should_expose_swagger != "true") {
            return 404;
        }
        root /usr/share/nginx/html;
    }

    # Optional: Add headers for security and caching
    location ~* .(?:ico|css|js|gif|jpe?g|png)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}