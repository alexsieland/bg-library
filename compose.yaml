name: bg-library
services:
  frontend:
    image: ghcr.io/${GHCR_USERNAME:-alexsieland}/bg-library-frontend:${APP_VERSION:-latest}
    restart: always
    environment:
      - BACKEND_PORT=8080
      - EXPOSE_SWAGGER_UI=true
      - API_URL=${API_URL:-http://localhost:80}
      - NGINX_HOST=${APP_HOST:-localhost}
      - SERVICE_NAME=nginx
    networks:
      - bg-library_frontend_nw
    ports:
      - ${FRONTEND_PORT:-80}:80
  backend:
    image: ghcr.io/${GHCR_USERNAME:-alexsieland}/bg-library-backend:${APP_VERSION:-latest}
    restart: always
    environment:
      - DB_PORT=5432
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=librarydb
      - GIN_MODE=release
      - CORS_ALLOWED_ORIGIN=*
      - API_URL=${API_URL:-http://localhost:80}
    networks:
      - bg-library_backend_nw
      - bg-library_frontend_nw
    ports:
      - ${BACKEND_PORT:-8080}:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      - db
  db:
    image: postgres:18.2
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-librarydb}
    networks:
      - bg-library_backend_nw
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - db-data:/var/lib/postgresql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  bg-library_backend_nw: {
    driver: bridge
  }
  bg-library_frontend_nw: {
    driver: bridge
  }

volumes:
  backend-cache: {}
  db-data: {}