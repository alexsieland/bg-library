name: bg-library
services:
  frontend:
    image: alexsieland/bg-library-frontend:${APP_VERSION:-latest}
    restart: always
    environment:
      - NGINX_HOST={APP_HOST:-localhost}
    networks:
      - client-side
    ports:
      - ${FRONTEND_PORT:-80}:80
  backend:
    image: alexsieland/bg-library-backend:${APP_VERSION:-latest}
    restart: always
    environment:
      - DB_PORT
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - GIN_MODE
      - CORS_ALLOWED_ORIGIN=*
    networks:
      - server-side
      - client-side
    ports:
      - ${BACKEND_PORT:-8080}:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      - db
  db:
    image: postgres:18.2
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - server-side
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - db-data:/var/lib/postgresql/18/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  client-side: {
    driver: bridge
  }
  server-side: {}

volumes:
  backend-cache: {}
  db-data: {}