name: Docker Build and Push
on:
  workflow_run:
    workflows: ["Backend Tests", "Frontend Tests"]
    types: [completed]
    branches: [main, correct-docker-deploy-issue]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to build'
        required: false
        default: 'main'
      skip_tests_check:
        description: 'Skip checking if tests passed (for testing)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Build without pushing (test mode)'
        required: false
        type: boolean
        default: false
jobs:
  check-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
    steps:
      - name: Check if both tests passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            let sha;
            let shouldBuild;
            // Handle manual workflow_dispatch trigger
            if (context.eventName === 'workflow_dispatch') {
              const skipCheck = '${{ github.event.inputs.skip_tests_check }}' === 'true';
              const ref = '${{ github.event.inputs.ref }}' || 'main';
              if (skipCheck) {
                console.log('Skipping tests check (manual override)');
                shouldBuild = true;
                sha = context.sha;
              } else {
                // Get the SHA for the specified ref
                const { data: refData } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${ref}`
                });
                sha = refData.object.sha;
                // Check if tests passed for this SHA
                const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head_sha: sha,
                  event: 'push',
                  status: 'completed'
                });
                const backendTests = workflowRuns.workflow_runs.find(run => run.name === 'Backend Tests');
                const frontendTests = workflowRuns.workflow_runs.find(run => run.name === 'Frontend Tests');
                shouldBuild = backendTests?.conclusion === 'success' && frontendTests?.conclusion === 'success';
                console.log(`Manual trigger for ref: ${ref} (SHA: ${sha})`);
                console.log(`Backend Tests: ${backendTests?.conclusion || 'not found'}`);
                console.log(`Frontend Tests: ${frontendTests?.conclusion || 'not found'}`);
              }
            } else {
              // Handle workflow_run trigger
              sha = context.payload.workflow_run.head_sha;
              // Get all workflow runs for this commit
              const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                event: 'push',
                status: 'completed'
              });
              // Check if both Backend Tests and Frontend Tests succeeded
              const backendTests = workflowRuns.workflow_runs.find(run => run.name === 'Backend Tests');
              const frontendTests = workflowRuns.workflow_runs.find(run => run.name === 'Frontend Tests');
              shouldBuild = backendTests?.conclusion === 'success' && frontendTests?.conclusion === 'success';
              console.log(`Backend Tests: ${backendTests?.conclusion || 'not found'}`);
              console.log(`Frontend Tests: ${frontendTests?.conclusion || 'not found'}`);
            }
            core.setOutput('should_build', shouldBuild);
            core.setOutput('commit_sha', sha);
            console.log(`Should build: ${shouldBuild}`);
  build-backend:
    needs: check-tests
    if: needs.check-tests.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-tests.outputs.commit_sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bg-library-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  build-frontend:
    needs: check-tests
    if: needs.check-tests.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-tests.outputs.commit_sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bg-library-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  build-database:
    needs: check-tests
    if: needs.check-tests.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-tests.outputs.commit_sha }}
      - name: Verify Dockerfile exists
        run: |
          echo "Checking for backend/db/Dockerfile..."
          ls -la backend/db/Dockerfile
          echo "File contents:"
          cat backend/db/Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bg-library-db
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/db/Dockerfile
          push: ${{ github.event.inputs.dry_run != 'true' }}
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
