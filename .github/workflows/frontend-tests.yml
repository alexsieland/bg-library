name: Frontend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run openapi-generator
      working-directory: ./frontend
      run: npx openapi-typescript ../swagger/api.yaml --output src/generated/library-api.d.ts

    - name: Run Svelte Check
      working-directory: ./frontend
      run: npm run check

    - name: Run Tests
      working-directory: ./frontend
      run: npm test
